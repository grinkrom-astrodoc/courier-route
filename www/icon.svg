<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0f172a"/>
  <!-- Route dots -->
  <circle cx="120" cy="370" r="36" fill="#f59e0b"/>
  <circle cx="392" cy="150" r="36" fill="#22c55e"/>
  <!-- Dashed route line -->
  <path d="M150 355 Q256 256 362 165" stroke="#6366f1" stroke-width="22" fill="none" stroke-dasharray="30,18" stroke-linecap="round"/>
  <!-- Scooter icon (simplified) -->
  <g transform="translate(210,230) rotate(-35)">
    <!-- Body -->
    <ellipse cx="40" cy="12" rx="44" ry="13" fill="#6366f1"/>
    <!-- Wheel back -->
    <circle cx="0" cy="26" r="20" fill="none" stroke="#818cf8" stroke-width="10"/>
    <circle cx="0" cy="26" r="6" fill="#818cf8"/>
    <!-- Wheel front -->
    <circle cx="80" cy="26" r="20" fill="none" stroke="#818cf8" stroke-width="10"/>
    <circle cx="80" cy="26" r="6" fill="#818cf8"/>
    <!-- Handlebar -->
    <rect x="68" y="-16" width="10" height="22" rx="5" fill="#a5b4fc"/>
    <!-- Rider body -->
    <ellipse cx="30" cy="-14" rx="16" ry="18" fill="#4f46e5"/>
    <!-- Rider head -->
    <circle cx="30" cy="-36" r="14" fill="#4f46e5"/>
    <!-- Helmet -->
    <path d="M18,-42 Q30,-58 42,-42" stroke="#818cf8" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Delivery box -->
    <rect x="48" y="-28" width="28" height="22" rx="4" fill="#34d186"/>
    <line x1="48" y1="-17" x2="76" y2="-17" stroke="#22c55e" stroke-width="2"/>
    <line x1="62" y1="-28" x2="62" y2="-6" stroke="#22c55e" stroke-width="2"/>
  </g>
</svg>
